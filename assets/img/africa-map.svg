  <rect x="20" y="360" width="14" height="14" fill="#1D4F3A" rx="2"/>
  <text x="40" y="372" font-family="Arial" font-size="10" fill="#4A5568">INS partenaires cibles</text>
  <rect x="20" y="380" width="14" height="14" fill="#EAF2EC" stroke="#1D4F3A" stroke-width="1" rx="2"/>
  <text x="40" y="392" font-family="Arial" font-size="10" fill="#4A5568">Zone UEMOA/CEDEAO/CEMAC</text>
</svg>
