  <text x="196" y="190" font-family="Arial" font-size="9" fill="#FAFAF8" font-weight="bold" text-anchor="middle">Nigeria</text>
  <text x="78" y="130" font-family="Arial" font-size="8" fill="#FAFAF8" text-anchor="middle">Sénégal</text>
  <text x="120" y="182" font-family="Arial" font-size="8" fill="#FAFAF8" text-anchor="middle">Côte d'Ivoire</text>
  <text x="310" y="170" font-family="Arial" font-size="8" fill="#FAFAF8" text-anchor="middle">Cameroun</text>
  <text x="330" y="225" font-family="Arial" font-size="7" fill="#FAFAF8" text-anchor="middle">RCA</text>
  <text x="313" y="265" font-family="Arial" font-size="7" fill="#9C6A10" text-anchor="middle">Gabon</text>
